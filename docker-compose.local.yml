services:
  nginx:
    container_name: openday_nginx_local
    image: nginx:alpine
    ports:
      - "5410:80"
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - openday_local
    restart: unless-stopped
    depends_on:
      - nextjs

  nextjs:
    container_name: openday_nextjs_local
    build:
      context: .
      dockerfile: Dockerfile.local
    env_file: .env.local
    environment:
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - openday_local
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    container_name: openday_mysql_local
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: openday_v3
      MYSQL_USER: openday
      MYSQL_PASSWORD: openday1234
    ports:
      - "3440:3306"
    volumes:
      - mysql_local_data:/var/lib/mysql
    networks:
      - openday_local
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  openday_local:
    driver: bridge

volumes:
  mysql_local_data:
