services:
  nextjs:
    container_name: openday_service_dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_KAKAO_JS_KEY: ${NEXT_PUBLIC_KAKAO_JS_KEY:-}
    env_file: .env.dev
    environment:
      NODE_ENV: production
    expose:
      - "5000"
    volumes:
      - uploads_dev_data:/app/public/uploads
    networks:
      - openday_dev
      - nginx_proxy
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    container_name: openday_mysql_dev
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    env_file: .env.dev
    volumes:
      - mysql_dev_data:/var/lib/mysql
    networks:
      - openday_dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  openday_dev:
    driver: bridge
  nginx_proxy:
    external: true

volumes:
  mysql_dev_data:
  uploads_dev_data:
