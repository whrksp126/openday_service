services:
  nextjs:
    container_name: openday_nextjs_prod
    image: whrksp126/openday_service:main
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_KAKAO_JS_KEY: ${NEXT_PUBLIC_KAKAO_JS_KEY:-}
        NEXT_PUBLIC_KAKAO_TEMPLATE_ID: ${NEXT_PUBLIC_KAKAO_TEMPLATE_ID:-}
    env_file: .env
    environment:
      NODE_ENV: production
    volumes:
      - uploads_data:/app/public/uploads
    networks:
      - openday_prod
      - nginx_proxy
    restart: always
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    container_name: openday_mysql_prod
    image: mysql:8.0
    env_file: .env
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - openday_prod
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  openday_prod:
    driver: bridge
  nginx_proxy:
    external: true

volumes:
  mysql_data:
  uploads_data:
