version: '3.8'

# ── Staging 환경 ──────────────────────────────────────────────────────────────
# 사용: docker compose -f docker-compose.stg.yml up -d
# env:  .env.stg
# 도메인: https://stg-openday.ghmate.com

services:
  mysql:
    container_name: openday_mysql_stg
    image: mysql:8.0
    env_file: .env.stg
    volumes:
      - mysql_stg_data:/var/lib/mysql
    networks:
      - openday_stg
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

  openday_service:
    container_name: openday_service_stg
    image: whrksp126/openday_service:stg
    build:
      context: .
      platforms:
        - linux/amd64
    env_file: .env.stg
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - images_stg_data:/app/app/images
    networks:
      - openday_stg
      - nginx_proxy
    restart: always
    command: gunicorn -w 2 --bind 0.0.0.0:5000 app:app

networks:
  openday_stg:
    driver: bridge
  nginx_proxy:
    external: true

volumes:
  mysql_stg_data:
  images_stg_data:
